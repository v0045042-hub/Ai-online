<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Online</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at 30% 20%, #1e3a8a, #0f172a 70%);
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#chat{
flex:1;
padding:15px;
padding-bottom:90px;
overflow-y:auto;
box-sizing:border-box;
}

.message{
margin:8px 0;
padding:10px 14px;
border-radius:16px;
max-width:75%;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#334155;
}

#inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:6px;
background:#0b1220;
padding:10px;
box-sizing:border-box;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#1e293b;
color:white;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:20px;
cursor:pointer;
background:#1e40af;
color:white;
}

button:active{
transform:scale(0.95);
}

.typing{
background:#334155;
display:inline-block;
padding:10px 14px;
border-radius:16px;
}

.dot{
display:inline-block;
animation: jump 1.2s infinite;
}

.dot:nth-child(2){ animation-delay:0.2s }
.dot:nth-child(3){ animation-delay:0.4s }

@keyframes jump{
0%{ transform:translateY(0) }
50%{ transform:translateY(-6px) }
100%{ transform:translateY(0) }
}
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Напишите сообщение...">
<button onclick="send()">➤</button>
<button onclick="settings()">⚙</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZVItq4tglHMvTj4DkCSBDI0DMOazQaPA",
  authDomain: "ai-online-f3d80.firebaseapp.com",
  projectId: "ai-online-f3d80",
  storageBucket: "ai-online-f3d80.firebasestorage.app",
  messagingSenderId: "25481594038",
  appId: "1:25481594038:web:d5c554845574386c8b5217"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let chatId = localStorage.getItem("chatId");
if(!chatId){
  chatId="chat_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("chatId",chatId);
}
alert(chatId)

const chat=document.getElementById("chat");

const q = query(collection(db,"messages"), orderBy("time"));
onSnapshot(q,(snapshot)=>{
  chat.innerHTML="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    if(data.chatId===chatId){
      add(data);
    }
  });
});

function add(msg){
  const div=document.createElement("div");
  div.className="message "+msg.role;
  chat.appendChild(div);

  if(msg.role==="ai"){
    typeEffect(div, msg.text);
  }else{
    div.textContent=msg.text;
  }

  chat.scrollTop=chat.scrollHeight;
}

function typeEffect(element, text){
  let i = 0;
  element.textContent = "";
  const interval = setInterval(()=>{
    element.textContent += text.charAt(i);
    i++;
    chat.scrollTop=chat.scrollHeight;
    if(i >= text.length){
      clearInterval(interval);
    }
  }, 20);
}

window.send = async function(){
  const input=document.getElementById("msg");
  if(!input.value)return;

  await addDoc(collection(db,"messages"),{
    chatId:chatId,
    text:input.value,
    role:"user",
    time:Date.now()
  });

  input.value="";
}

window.settings = async function(){
  const code=prompt("Промокод:");

  if(code==="AIMODESCR"){

    const chats = prompt("Введите chatId (или пусто = текущий):");
    const targetChat = chats || chatId;
    const text=prompt("Ответ ИИ:");

    if(text){

      const thinking = document.createElement("div");
      thinking.className="typing";
      thinking.innerHTML='ИИ думает<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
      chat.appendChild(thinking);
      chat.scrollTop=chat.scrollHeight;

      setTimeout(async ()=>{
        thinking.remove();

        await addDoc(collection(db,"messages"),{
          chatId:targetChat,
          text:text,
          role:"ai",
          time:Date.now()
        });

      },1200);
    }

  }else{
    alert("Неверный код");
  }
}

</script>

</body>
</html>
