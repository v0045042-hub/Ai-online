<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Online</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;display:flex;height:100vh}
#chat{flex:1;padding:20px;overflow:auto}
.message{margin:10px 0;padding:10px;border-radius:8px;max-width:60%}
.user{background:#2563eb;margin-left:auto}
.ai{background:#334155}
#inputArea{position:fixed;bottom:0;width:100%;display:flex;background:#1e293b;padding:10px}
input{flex:1;padding:10px;border:none;border-radius:5px}
button{margin-left:5px;padding:10px;border:none;border-radius:5px;cursor:pointer}
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Напишите сообщение...">
<button onclick="send()">Отправить</button>
<button onclick="settings()">⚙</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZVItq4tglHMvTj4DkCSBDI0DMOazQaPA",
  authDomain: "ai-online-f3d80.firebaseapp.com",
  projectId: "ai-online-f3d80",
  storageBucket: "ai-online-f3d80.firebasestorage.app",
  messagingSenderId: "25481594038",
  appId: "1:25481594038:web:d5c554845574386c8b5217"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let chatId = localStorage.getItem("chatId");
if(!chatId){
  chatId="chat_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("chatId",chatId);
}
console.log(chatId)

const chat=document.getElementById("chat");

// 🔥 слушаем сообщения
const q = query(collection(db,"messages"), orderBy("time"));
onSnapshot(q,(snapshot)=>{
  chat.innerHTML="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    if(data.chatId===chatId){
      add(data);
    }
  });
});

// вывод сообщения
function add(msg){
  const div=document.createElement("div");
  div.className="message "+msg.role;
  div.textContent=msg.text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// отправка пользователем
window.send = async function(){
  const input=document.getElementById("msg");
  if(!input.value)return;

  await addDoc(collection(db,"messages"),{
    chatId:chatId,
    text:input.value,
    role:"user",
    time:Date.now()
  });

  input.value="";
}

// режим админа
window.settings = async function(){
  const code=prompt("Промокод:");
  if(code==="AIMODESCR"){

    const chats = prompt("Введите chatId для ответа (или оставьте пустым для текущего):");

    const targetChat = chats || chatId;

    const text=prompt("Ответ ИИ:");
    if(text){
      await addDoc(collection(db,"messages"),{
        chatId:targetChat,
        text:text,
        role:"ai",
        time:Date.now()
      });
    }

  }else{
    alert("Неверный код");
  }
}

</script>

</body>
</html>
